name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -q

# NOTE: this file lives in ci/ because the token used for the initial push
# lacked the GitHub "workflow" scope. To enable CI, move it to
# .github/workflows/tests.yml and push (e.g. after `gh auth refresh -h
# github.com -s workflow`), or add it via the GitHub web UI.
