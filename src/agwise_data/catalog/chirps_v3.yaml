# Catalog entry: CHIRPS v3.0 daily precipitation (served from the local tree).
# Field names follow the CGIAR Climate Data Hub metadata core (id, title,
# description, license, providers, extent, version) plus AgWise extensions
# (variables, access, driver).
id: chirps_v3
title: CHIRPS v3.0 daily precipitation
description: >
  Climate Hazards Center InfraRed Precipitation with Stations (CHIRPS)
  v3.0: quasi-global daily rainfall at 0.05 degree resolution. Served
  exclusively from the yearly files staged on CGLabs (1981-2023, ~24 GB
  per year) — there is no network fetch wired, so it also sidesteps the
  data.chc.ucsb.edu 403 blocking that affects the v2.0 global NetCDF.
  Select it per call with source="chirps_v3" (CHIRPS v2.0 stays the
  default rainfall source).
license: Public domain (freely available; cite the Climate Hazards Center)
citation: >
  Climate Hazards Center, UC Santa Barbara. CHIRPS v3.0 quasi-global
  daily precipitation. https://www.chc.ucsb.edu/data/chirps
version: "3.0"
providers:
  - name: UCSB Climate Hazards Center
    roles: [producer]
    url: https://www.chc.ucsb.edu/data/chirps
  - name: AgWise CGLabs (staged copy)
    roles: [host]
extent:
  spatial:
    bbox: [-180.0, -60.0, 180.0, 60.0]
  temporal:
    start: "1981-01-01"
    end: "2023-12-31"   # staged years; 2024+ are partial .part downloads
spatial_resolution_deg: 0.05
temporal_resolution: daily

driver: chirps_v3
access:
  - type: local
    role: primary
    # Yearly files in the AgWise Global_GeoData/Landing tree, read (and
    # region-clipped) when AGWISE_LOCAL_ROOT is set — the only access path.
    # Flat layout, data variable `precip` in mm/day, ascending latitude.
    path: "Rainfall/chirps_v3/{year}.nc"

variables:
  AGRO.PRCP:
    source_name: precip
    source_units: "mm day-1"
    conversion: null
