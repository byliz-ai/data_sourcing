# Catalog entry: AgERA5 daily agrometeorological indicators.
# Downloaded from the Copernicus Climate Data Store (CDS). Requires a free
# CDS account and a ~/.cdsapirc file — see docs/cglabs_setup.md. Never put
# API keys in code.
id: agera5
title: AgERA5 daily agrometeorological indicators
description: >
  Daily surface meteorological variables for agriculture derived from ERA5
  reanalysis at 0.1 degree resolution, 1979 to near-present (about 7 days
  behind real time). AgWise uses it for temperature, solar radiation,
  relative humidity and wind speed.
license: Copernicus License (free use with attribution)
citation: >
  Boogaard, H. et al. (2020): Agrometeorological indicators from 1979 to
  present derived from reanalysis. Copernicus Climate Change Service (C3S)
  Climate Data Store (CDS). https://doi.org/10.24381/cds.6c68c9bb
version: "1.1"
providers:
  - name: Copernicus Climate Change Service (C3S)
    roles: [producer, host]
    url: https://cds.climate.copernicus.eu
extent:
  spatial:
    bbox: [-180.0, -90.0, 180.0, 90.0]
  temporal:
    start: "1979-01-01"
    end: null   # near-present, ~7 day lag
spatial_resolution_deg: 0.1
temporal_resolution: daily

driver: agera5
access:
  - type: cds
    role: primary
    dataset: sis-agrometeorological-indicators
    version: "1_1"
  - type: gee
    role: alternative
    collection: "projects/climate-engine-pro/assets/ce-ag-era5-v2/daily"
    note: AgERA5 v2 mirror in the GEE community catalog (used by legacy scripts).

variables:
  AGRO.TMAX:
    source_name: 2m_temperature
    statistic: 24_hour_maximum
    source_units: K
    conversion: k_to_degc
  AGRO.TMIN:
    source_name: 2m_temperature
    statistic: 24_hour_minimum
    source_units: K
    conversion: k_to_degc
  AGRO.TEMP:
    source_name: 2m_temperature
    statistic: 24_hour_mean
    source_units: K
    conversion: k_to_degc
  AGRO.SRAD:
    source_name: solar_radiation_flux
    source_units: "J m-2 day-1"
    conversion: jm2_to_mjm2
  AGRO.RHUM:
    source_name: 2m_relative_humidity
    source_units: "%"
    conversion: null
    extra_request:
      time: "12_00"
  AGRO.WIND:
    source_name: 10m_wind_speed
    statistic: 24_hour_mean
    source_units: "m s-1"
    conversion: null
  AGRO.PRCP:
    source_name: precipitation_flux
    source_units: "mm day-1"
    conversion: null
    note: Alternative rainfall; CHIRPS is the AgWise default for AGRO.PRCP.
